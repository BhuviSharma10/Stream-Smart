<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamSmart - Video Conference</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Join Screen */
        .join-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .join-card {
            background: #141414;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            border: 1px solid #2a2a2a;
        }
        
        .join-card h1 {
            margin-bottom: 10px;
            color: #00c8ff;
        }
        
        .join-card input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            text-align: center;
        }
        
        .btn {
            padding: 12px 30px;
            background: #00c8ff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            font-size: 14px;
        }
        
        .btn-secondary {
            background: #ff3c6e;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        /* Conference UI */
        .conference-ui {
            display: none;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #141414;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 20px;
        }
        
        .room-code {
            color: #00c8ff;
            font-size: 24px;
            font-weight: bold;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        
        .video-card {
            background: #141414;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #2a2a2a;
            transition: all 0.3s;
        }
        
        .video-card.delta-active {
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0,255,136,0.3);
        }
        
        .video-placeholder {
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            position: relative;
        }
        
        .video-label {
            padding: 10px;
            background: rgba(0,0,0,0.8);
            font-size: 12px;
        }
        
        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #00c8ff;
            color: #000;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: bold;
        }
        
        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #141414;
            padding: 10px 20px;
            border-radius: 50px;
            display: flex;
            gap: 15px;
            border: 1px solid #2a2a2a;
        }
        
        .bandwidth-slider {
            margin: 20px;
            padding: 15px;
            background: #141414;
            border-radius: 10px;
        }
        
        .stats {
            margin: 20px;
            padding: 20px;
            background: #141414;
            border-radius: 10px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #00c8ff;
        }
        
        .savings {
            color: #00ff88;
            font-size: 36px;
            font-weight: bold;
        }
        
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #141414;
            border: 1px solid #2a2a2a;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 100;
        }
        
        .back-btn:hover {
            background: #00c8ff;
            color: #000;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #00c8ff;
            color: #000;
            padding: 15px 20px;
            border-radius: 10px;
            animation: slideIn 0.5s ease;
            z-index: 2000;
            font-weight: bold;
        }
    </style>
</head>
<body>

<!-- Back Button -->
<button class="back-btn" onclick="goBack()">← Back</button>

<!-- Join Screen -->
<div class="join-screen" id="joinScreen">
    <div class="join-card">
        <h1>🎥 Video Conference</h1>
        <p style="color: #666; margin-bottom: 20px;">Delta-Optimized Streaming</p>
        
        <input type="text" id="roomCodeInput" placeholder="Enter Room Code" maxlength="6">
        
        <div>
            <button class="btn" onclick="createRoom()">✨ Create Room</button>
            <button class="btn btn-secondary" onclick="joinRoom()">🚪 Join Room</button>
        </div>
        
        <div style="margin-top: 20px; font-size: 12px; color: #666;">
            ⚡ Saves up to 70% data
        </div>
    </div>
</div>

<!-- Conference UI -->
<div class="conference-ui" id="conferenceUI">
    <div class="header">
        <div>
            Room: <span class="room-code" id="roomCode">------</span>
        </div>
        <div id="participantCount">👥 1 participant</div>
    </div>
    
    <div class="video-grid" id="videoGrid">
        <div class="video-card" id="teacherVideo">
            <div class="video-placeholder">
                🧑‍🏫
                <div class="badge" id="teacherBadge">📹 HD</div>
            </div>
            <div class="video-label">Teacher</div>
        </div>
    </div>
    
    <div class="bandwidth-slider">
        <label>📶 Bandwidth: <span id="bandwidthValue">5.0</span> Mbps</label>
        <input type="range" id="bandwidth" min="0.5" max="10" step="0.1" value="5" style="width: 100%; margin-top: 10px;">
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="btn" style="padding: 5px 15px;" onclick="setBandwidth(1)">2G</button>
            <button class="btn" style="padding: 5px 15px;" onclick="setBandwidth(3)">3G</button>
            <button class="btn" style="padding: 5px 15px;" onclick="setBandwidth(5)">4G</button>
            <button class="btn" style="padding: 5px 15px;" onclick="setBandwidth(10)">5G</button>
        </div>
    </div>
    
    <div class="stats">
        <h3>📊 Data Savings</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px;">
            <div style="text-align: center;">
                <div style="color: #666;">Normal</div>
                <div class="stat-value" id="normalData">0 MB</div>
            </div>
            <div style="text-align: center;">
                <div style="color: #666;">Delta</div>
                <div class="stat-value" id="deltaData">0 MB</div>
            </div>
        </div>
        <div style="text-align: center; margin-top: 20px; padding: 20px; background: #1a1a1a; border-radius: 10px;">
            <div style="color: #666;">SAVED</div>
            <div class="savings" id="savings">0%</div>
        </div>
    </div>
    
    <div class="controls">
        <button class="btn" onclick="leaveCall()">🚪 Leave</button>
    </div>
</div>

<script>
    let streamingInterval = null;
    let normalTotal = 0;
    let deltaTotal = 0;
    let isStreaming = false;
    let currentBandwidth = 5.0;
    let currentRoomCode = null;
    
    const NORMAL_RATE = 4.0;
    const DELTA_RATE = 1.2;
    
    // Bandwidth slider
    const bandwidthSlider = document.getElementById('bandwidth');
    bandwidthSlider.addEventListener('input', function(e) {
        currentBandwidth = parseFloat(e.target.value);
        document.getElementById('bandwidthValue').textContent = currentBandwidth.toFixed(1);
        updateStreamingMode();
    });
    
    function setBandwidth(mbps) {
        bandwidthSlider.value = mbps;
        currentBandwidth = mbps;
        document.getElementById('bandwidthValue').textContent = mbps;
        updateStreamingMode();
    }
    
    function updateStreamingMode() {
        if (currentBandwidth < 1.5) {
            document.getElementById('teacherBadge').innerHTML = '⚡ DELTA';
            document.getElementById('teacherBadge').style.background = '#00ff88';
            document.getElementById('teacherVideo').classList.add('delta-active');
        } else if (currentBandwidth < 3) {
            document.getElementById('teacherBadge').innerHTML = '📊 MEDIUM';
            document.getElementById('teacherBadge').style.background = '#ffaa00';
        } else {
            document.getElementById('teacherBadge').innerHTML = '📹 HD';
            document.getElementById('teacherBadge').style.background = '#00c8ff';
            document.getElementById('teacherVideo').classList.remove('delta-active');
        }
    }
    
    async function createRoom() {
        try {
            showNotification('Creating room...');
            const response = await fetch('/api/create_room');
            const data = await response.json();
            
            if (data.success) {
                currentRoomCode = data.room_code;
                startConference();
                showNotification('✅ Room created! Code: ' + currentRoomCode);
            } else {
                showNotification('Failed to create room');
            }
        } catch (error) {
            showNotification('Server error! Run python app_demo.py');
        }
    }
    
    async function joinRoom() {
        const roomCode = document.getElementById('roomCodeInput').value.toUpperCase();
        if (!roomCode) {
            showNotification('Enter room code');
            return;
        }
        
        try {
            showNotification('Joining room...');
            const response = await fetch('/api/create_room');
            const data = await response.json();
            
            if (data.success) {
                currentRoomCode = roomCode;
                startConference();
                showNotification('✅ Joined room ' + roomCode);
                
                // Add student video
                const videoGrid = document.getElementById('videoGrid');
                const studentCard = document.createElement('div');
                studentCard.className = 'video-card';
                studentCard.id = 'studentVideo';
                studentCard.innerHTML = `
                    <div class="video-placeholder">
                        👨‍🎓
                        <div class="badge" id="studentBadge">📹 HD</div>
                    </div>
                    <div class="video-label">Student</div>
                `;
                videoGrid.appendChild(studentCard);
                document.getElementById('participantCount').textContent = '👥 2 participants';
            } else {
                showNotification('Room not found!');
            }
        } catch (error) {
            showNotification('Server error!');
        }
    }
    
    function startConference() {
        document.getElementById('joinScreen').style.display = 'none';
        document.getElementById('conferenceUI').style.display = 'block';
        document.getElementById('roomCode').textContent = currentRoomCode;
        startStreaming();
    }
    
    function startStreaming() {
        if (isStreaming) return;
        isStreaming = true;
        
        streamingInterval = setInterval(() => {
            const factor = Math.min(currentBandwidth / 5, 1);
            normalTotal += NORMAL_RATE * factor;
            deltaTotal += DELTA_RATE * factor;
            
            document.getElementById('normalData').textContent = normalTotal.toFixed(1);
            document.getElementById('deltaData').textContent = deltaTotal.toFixed(1);
            
            const savings = ((normalTotal - deltaTotal) / normalTotal * 100).toFixed(1);
            document.getElementById('savings').textContent = savings + '%';
        }, 1000);
    }
    
    function leaveCall() {
        if (streamingInterval) clearInterval(streamingInterval);
        window.location.reload();
    }
    
    function goBack() {
        window.location.href = '/';
    }
    function goBack() {
    window.location.href = '/main';
}
    function showNotification(message) {
        const notification = document.createElement('div');
        notification.className = 'notification';
        notification.textContent = message;
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 3000);
    }
</script>
</body>
</html>
